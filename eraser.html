<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 지우개 - 원치 않는 개체 및 워터마크 제거</title>
    <link rel="canonical" href="https://kmathlove-wq.github.io/Remove-image-background/eraser.html">
    <meta name="description" content="AI 기술을 활용하여 이미지에서 워터마크, 텍스트, 불필요한 개체를 깔끔하게 지워보세요. 브라우저에서 바로 사용 가능한 무료 온라인 AI 지우개 도구입니다.">
    
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <script src="coi-serviceworker.js"></script>
    <link rel="stylesheet" href="style.css">
    <!-- ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
</head>
<body>
    <div class="container">
        <nav class="main-nav">
            <a href="index.html" class="nav-item">배경 제거</a>
            <a href="eraser.html" class="nav-item active">AI 지우개</a>
        </nav>
        
        <header>
            <h1>AI 이미지 지우개</h1>
            <p>사진 속 원치 않는 물체나 워터마크를 AI로 흔적 없이 지워보세요. 붓으로 칠하기만 하면 주변 배경과 자연스럽게 합성됩니다.</p>
        </header>

        <main>
            <section class="upload-section" id="upload-container">
                <div id="drop-zone" class="drop-zone glass">
                    <div class="drop-zone-content">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p>이미지를 드래그하거나 클릭하여 업로드</p>
                        <span class="file-info">PNG, JPG, WEBP 지원 (최대 10MB)</span>
                    </div>
                    <input type="file" id="file-input" accept="image/*" hidden>
                </div>
            </section>

            <section id="editor-section" class="result-section hidden">
                <div class="editor-wrapper glass">
                    <div class="toolbar">
                        <div class="tool-group">
                            <label for="brush-size">브러시 크기</label>
                            <input type="range" id="brush-size" min="5" max="100" value="30">
                            <span id="brush-size-value">30px</span>
                        </div>
                        <div class="tool-group">
                            <button id="undo-btn" class="secondary-btn btn-sm" title="뒤로 가기">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                            </button>
                            <button id="clear-btn" class="secondary-btn btn-sm" title="모두 지우기">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="canvas-container" id="canvas-container">
                        <canvas id="image-canvas"></canvas>
                        <canvas id="mask-canvas"></canvas>
                        
                        <div id="editor-loader" class="loader hidden overlay-loader">
                            <div class="spinner"></div>
                            <p id="status-text">AI가 이미지를 수정하고 있습니다...</p>
                            <div class="progress-bar-container">
                                <div id="progress-bar" class="progress-bar"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button id="reset-btn" class="secondary-btn">다시 하기</button>
                    <button id="erase-btn" class="primary-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16C2 15 2 14 3 13L13 3C14 2 15 2 16 3L21 8C22 9 22 10 21 11L15 17"></path><path d="M18 12.5L12.5 18"></path></svg>
                        객체 삭제하기
                    </button>
                    <a id="download-btn" class="primary-btn hidden">결과 다운로드</a>
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; 2026 AI Image Tools. Built with Advanced AI Technology.</p>
                <div class="footer-links">
                    <a href="index.html">배경 제거</a>
                    <a href="eraser.html">AI 지우개</a>
                </div>
            </div>
        </footer>
    </div>

    <script type="module" src="eraser.js"></script>
</body>
</html>
