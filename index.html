<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 배경 제거 도구 - 빠르고 간편한 온라인 배경 지우기</title>
    <link rel="canonical" href="https://kmathlove-wq.github.io/Remove-image-background/">
    <meta name="description" content="AI 기술을 활용하여 클릭 한 번으로 이미지의 배경을 정확하게 제거하세요. 프로그램 설치 없이 브라우저에서 바로 사용 가능한 무료 온라인 배경 제거 도구입니다.">
    <meta name="keywords" content="배경 제거, 누끼 따기, AI 이미지 처리, 이미지 배경 지우기, 온라인 배경 제거, 무료 도구">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kmathlove-wq.github.io/Remove-image-background/">
    <meta property="og:title" content="AI 배경 제거 도구">
    <meta property="og:description" content="AI가 자동으로 이미지의 배경을 지워줍니다. 지금 바로 무료로 체험해 보세요!">
    <meta property="og:image" content="https://kmathlove-wq.github.io/Remove-image-background/favicon.svg">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <script src="coi-serviceworker.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 이미지 배경 제거</h1>
            <p>이미지를 업로드하면 AI가 자동으로 배경을 제거합니다.</p>
        </header>

        <main>
            <section class="upload-section">
                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p>이미지를 드래그하거나 클릭하여 업로드하세요</p>
                        <span class="file-info">PNG, JPG, WEBP 지원</span>
                    </div>
                    <input type="file" id="file-input" accept="image/*" hidden>
                </div>
            </section>

            <section id="result-section" class="result-section hidden">
                <div class="preview-container">
                    <div class="preview-box">
                        <h3>원본 이미지</h3>
                        <div class="image-wrapper">
                            <img id="original-preview" src="" alt="원본 미리보기">
                        </div>
                    </div>
                    <div class="preview-box">
                        <h3>배경 제거 결과</h3>
                        <div class="image-wrapper processed-wrapper">
                            <div id="loader" class="loader hidden">
                                <div class="spinner"></div>
                                <p id="status-text">처리 중...</p>
                                <div class="progress-bar-container">
                                    <div id="progress-bar" class="progress-bar"></div>
                                </div>
                            </div>
                            <img id="processed-preview" src="" alt="처리된 이미지" class="hidden">
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button id="reset-btn" class="secondary-btn">다시 하기</button>
                    <a id="download-btn" class="primary-btn hidden" download="processed-image.png">다운로드</a>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 AI Image Tools. All rights reserved.</p>
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
